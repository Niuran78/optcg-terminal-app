<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — OPTCG Market Terminal</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%230a0a0b'/%3E%3Cpath d='M8 10h6l4 12 4-12h6' stroke='%2300e5c0' stroke-width='2.5' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E" />
</head>
<body id="auth-page">
  <div class="auth-root">
    <div class="auth-card">

      <!-- Logo -->
      <div class="auth-logo">
        <div class="auth-logo-mark">
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none" aria-label="OPTCG Terminal">
            <path d="M5 8h5l4 12 4-12h5" stroke="#00e5c0" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="14" cy="22" r="1.5" fill="#00e5c0"/>
          </svg>
        </div>
        <h1 class="auth-title">OPTCG Terminal</h1>
        <p class="auth-sub">Market intelligence for One Piece TCG</p>
      </div>

      <!-- Tabs -->
      <div class="auth-tabs">
        <button class="auth-tab active" id="tab-login">Sign In</button>
        <button class="auth-tab" id="tab-register">Create Account</button>
      </div>

      <!-- Login Form -->
      <form class="auth-form" id="form-login" autocomplete="on" novalidate>
        <div class="form-group">
          <label class="form-label" for="login-email">Email address</label>
          <input
            class="form-input"
            type="email"
            id="login-email"
            name="email"
            placeholder="you@example.com"
            autocomplete="email"
            required
          />
        </div>

        <div class="form-group">
          <label class="form-label" for="login-password">Password</label>
          <input
            class="form-input"
            type="password"
            id="login-password"
            name="password"
            placeholder="••••••••"
            autocomplete="current-password"
            required
          />
        </div>

        <p class="form-error" id="login-error" aria-live="polite"></p>

        <button class="btn btn-primary btn-lg" type="submit" style="width:100%; margin-top: 4px;">
          Sign In
        </button>

        <p class="auth-footer">
          Don't have an account?
          <a class="auth-link" href="#" id="link-to-register">Create one free</a>
        </p>
      </form>

      <!-- Register Form -->
      <form class="auth-form hidden" id="form-register" autocomplete="on" novalidate>
        <div class="form-group">
          <label class="form-label" for="reg-email">Email address</label>
          <input
            class="form-input"
            type="email"
            id="reg-email"
            name="email"
            placeholder="you@example.com"
            autocomplete="email"
            required
          />
        </div>

        <div class="form-group">
          <label class="form-label" for="reg-password">Password</label>
          <input
            class="form-input"
            type="password"
            id="reg-password"
            name="password"
            placeholder="Min. 8 characters"
            autocomplete="new-password"
            required
          />
        </div>

        <div class="form-group">
          <label class="form-label" for="reg-confirm">Confirm password</label>
          <input
            class="form-input"
            type="password"
            id="reg-confirm"
            name="confirm"
            placeholder="Repeat password"
            autocomplete="new-password"
            required
          />
        </div>

        <p class="form-error" id="register-error" aria-live="polite"></p>

        <button class="btn btn-primary btn-lg" type="submit" style="width:100%; margin-top: 4px;">
          Create Account
        </button>

        <p class="auth-footer">
          Already have an account?
          <a class="auth-link" href="#" id="link-to-login">Sign in</a>
        </p>
      </form>

    </div>

    <!-- Tier comparison teaser -->
    <div style="margin-top: 32px; max-width: 420px; width: 100%;">
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
        <div style="background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-lg); padding: 16px;">
          <div style="font-family: var(--font-mono); font-size: 9px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px;">Free</div>
          <div style="font-size: 13px; color: var(--text-2); display: flex; flex-direction: column; gap: 6px;">
            <div>✓ 10 cards preview</div>
            <div>✓ Overview stats</div>
            <div style="color: var(--muted);">✗ Full card browser</div>
            <div style="color: var(--muted);">✗ Arbitrage scanner</div>
          </div>
        </div>
        <div style="background: var(--surface); border: 1px solid rgba(0,229,192,0.25); border-radius: var(--r-lg); padding: 16px; background: linear-gradient(135deg, rgba(0,229,192,0.05), var(--surface));">
          <div style="font-family: var(--font-mono); font-size: 9px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent); margin-bottom: 8px;">Elite</div>
          <div style="font-size: 13px; color: var(--text-2); display: flex; flex-direction: column; gap: 6px;">
            <div>✓ All cards unlocked</div>
            <div>✓ Arbitrage alerts</div>
            <div>✓ Sealed tracker</div>
            <div>✓ Live price feeds</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="auth.js"></script>
  <script>
    // Cross-link tab buttons
    document.getElementById('link-to-register')?.addEventListener('click', (e) => {
      e.preventDefault();
      document.getElementById('tab-register').click();
    });
    document.getElementById('link-to-login')?.addEventListener('click', (e) => {
      e.preventDefault();
      document.getElementById('tab-login').click();
    });
  </script>
</body>
</html>
