<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OPTCG Product Terminal Widget</title>
<style>
  body {
    margin: 0; padding: 24px;
    background: #080808;
    font-family: 'Cabinet Grotesk', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    display: flex; justify-content: center;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  .ptw {
    font-family: 'Cabinet Grotesk', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0f0f10;
    border: 1px solid #1e2a28;
    border-radius: 12px;
    overflow: hidden;
    max-width: 720px;
    width: 100%;
    color: #e8e6e0;
  }

  /* Header */
  .ptw-header {
    background: #111614;
    border-bottom: 1px solid #1e2a28;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .ptw-header-icon {
    width: 28px; height: 28px;
    background: #00e5c0;
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .ptw-header-text h3 {
    font-size: 13px; font-weight: 700; color: #e8e6e0;
    letter-spacing: 0.03em; text-transform: uppercase;
  }
  .ptw-header-text p { font-size: 11px; color: #4a6660; margin-top: 1px; }
  .ptw-live-badge {
    margin-left: auto;
    background: rgba(0,229,192,0.1);
    border: 1px solid rgba(0,229,192,0.2);
    color: #00e5c0;
    font-size: 10px; font-weight: 700;
    letter-spacing: 0.08em; text-transform: uppercase;
    padding: 3px 8px; border-radius: 4px;
    display: flex; align-items: center; gap: 5px;
  }
  .ptw-live-dot {
    width: 5px; height: 5px;
    background: #00e5c0; border-radius: 50%;
    animation: ptw-pulse 2s infinite;
  }
  @keyframes ptw-pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* Set detection bar */
  .ptw-set-bar {
    padding: 10px 20px;
    background: rgba(0,229,192,0.04);
    border-bottom: 1px solid #1e2a28;
    font-size: 12px;
    color: #4a6660;
    display: flex; align-items: center; gap: 6px;
  }
  .ptw-set-bar strong { color: #00e5c0; font-weight: 700; }

  /* Body */
  .ptw-body { padding: 20px; }

  /* Stats grid */
  .ptw-stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-bottom: 20px;
  }
  .ptw-stat {
    background: #161a19;
    border: 1px solid #1e2a28;
    border-radius: 8px;
    padding: 12px 10px;
    text-align: center;
  }
  .ptw-stat.highlight {
    border-color: rgba(0,229,192,0.3);
    background: rgba(0,229,192,0.04);
  }
  .ptw-stat-label {
    font-size: 10px; font-weight: 700;
    letter-spacing: 0.06em; text-transform: uppercase;
    color: #4a6660;
    margin-bottom: 6px;
  }
  .ptw-stat-value {
    font-size: 18px; font-weight: 800; color: #e8e6e0; line-height: 1;
  }
  .ptw-stat-value.accent { color: #00e5c0; }
  .ptw-stat-value.positive { color: #00e5c0; }
  .ptw-stat-value.negative { color: #e55c5c; }
  .ptw-stat-sub {
    font-size: 10px; color: #4a6660; margin-top: 4px;
  }

  /* Cards table */
  .ptw-section-title {
    font-size: 11px; font-weight: 700;
    letter-spacing: 0.08em; text-transform: uppercase;
    color: #4a6660;
    margin-bottom: 10px;
    display: flex; align-items: center; gap: 6px;
  }
  .ptw-table { width: 100%; border-collapse: collapse; }
  .ptw-table th {
    font-size: 10px; font-weight: 700;
    letter-spacing: 0.06em; text-transform: uppercase;
    color: #2e3d3a; text-align: left;
    padding: 6px 8px; border-bottom: 1px solid #1e2a28;
  }
  .ptw-table th:last-child { text-align: right; }
  .ptw-table td {
    font-size: 12px; padding: 10px 8px;
    border-bottom: 1px solid #131a18;
    color: #a0b0ae;
    vertical-align: middle;
  }
  .ptw-table tr:last-child td { border-bottom: none; }
  .ptw-table td:last-child { text-align: right; }

  .ptw-card-cell {
    display: flex; align-items: center; gap: 10px;
  }
  .ptw-card-img {
    width: 36px; height: 50px;
    border-radius: 4px; object-fit: cover;
    background: #161a19;
    flex-shrink: 0;
  }
  .ptw-card-img-placeholder {
    width: 36px; height: 50px;
    border-radius: 4px;
    background: #161a19;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0;
  }
  .ptw-card-name {
    font-weight: 600; color: #e8e6e0;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    max-width: 200px;
  }
  .ptw-card-meta { font-size: 10px; color: #4a6660; margin-top: 2px; }
  .ptw-card-price { font-weight: 700; color: #00e5c0; white-space: nowrap; }

  .ptw-rarity {
    display: inline-block; font-size: 9px; font-weight: 700;
    padding: 2px 5px; border-radius: 3px;
    margin-left: 4px; vertical-align: middle;
  }
  .ptw-rarity-sec    { background: rgba(229,92,92,0.15);   color: #e55c5c; }
  .ptw-rarity-sr     { background: rgba(100,150,200,0.15); color: #6496c8; }
  .ptw-rarity-leader { background: rgba(232,160,64,0.15);  color: #e8a040; }
  .ptw-rarity-rare   { background: rgba(160,80,220,0.15);  color: #a050dc; }

  /* Set picker fallback */
  .ptw-picker {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap: 8px;
    margin-top: 12px;
  }
  .ptw-picker-btn {
    background: #161a19;
    border: 1px solid #1e2a28;
    border-radius: 8px;
    padding: 10px 12px;
    cursor: pointer;
    transition: all 180ms ease;
    text-align: left;
    color: #e8e6e0;
    font-family: inherit;
  }
  .ptw-picker-btn:hover {
    border-color: rgba(0,229,192,0.3);
    background: #1a2220;
  }
  .ptw-picker-name { font-size: 12px; font-weight: 700; }
  .ptw-picker-sub { font-size: 10px; color: #4a6660; margin-top: 2px; }

  /* Loading skeleton */
  .ptw-skeleton {
    background: linear-gradient(90deg, #161a19 25%, #1e2a28 50%, #161a19 75%);
    background-size: 200% 100%;
    animation: ptw-shimmer 1.5s infinite;
    border-radius: 4px;
  }
  @keyframes ptw-shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
  .ptw-skeleton-stat { height: 48px; }
  .ptw-skeleton-row { height: 16px; margin-bottom: 12px; }
  .ptw-skeleton-row.short { width: 60%; }

  /* Error state */
  .ptw-error {
    text-align: center; padding: 24px 16px;
    color: #4a6660; font-size: 13px;
  }
  .ptw-error strong { color: #e55c5c; display: block; margin-bottom: 6px; font-size: 14px; }

  /* Footer */
  .ptw-footer {
    border-top: 1px solid #1e2a28;
    padding: 10px 20px;
    display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: 6px;
  }
  .ptw-footer-note { font-size: 10px; color: #2e3d3a; }
  .ptw-footer-link {
    font-size: 11px; font-weight: 700;
    color: #00e5c0; text-decoration: none;
  }
  .ptw-footer-link:hover { color: #00c4a4; }

  /* Responsive */
  @media (max-width: 560px) {
    .ptw-stats { grid-template-columns: repeat(2, 1fr); }
    .ptw-picker { grid-template-columns: repeat(2, 1fr); }
    .ptw-card-name { max-width: 120px; }
  }
</style>
</head>
<body>

<div class="ptw" id="ptw-root">

  <!-- Header -->
  <div class="ptw-header">
    <div class="ptw-header-icon">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>
    </div>
    <div class="ptw-header-text">
      <h3>Live Market Data</h3>
      <p>Prices from OPTCG Terminal</p>
    </div>
    <div class="ptw-live-badge"><div class="ptw-live-dot"></div>LIVE</div>
  </div>

  <!-- Set detection bar -->
  <div class="ptw-set-bar" id="ptw-set-bar">
    <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><circle cx="6" cy="6" r="5" stroke="#4a6660" stroke-width="1.2"/><path d="M6 4v2.5l2 1.5" stroke="#4a6660" stroke-width="1.2" stroke-linecap="round"/></svg>
    Detecting set...
  </div>

  <!-- Body -->
  <div class="ptw-body" id="ptw-body">
    <div class="ptw-stats" id="ptw-stats">
      <div class="ptw-stat"><div class="ptw-skeleton ptw-skeleton-stat"></div></div>
      <div class="ptw-stat"><div class="ptw-skeleton ptw-skeleton-stat"></div></div>
      <div class="ptw-stat"><div class="ptw-skeleton ptw-skeleton-stat"></div></div>
      <div class="ptw-stat"><div class="ptw-skeleton ptw-skeleton-stat"></div></div>
    </div>
    <div id="ptw-cards-section">
      <div class="ptw-skeleton ptw-skeleton-row"></div>
      <div class="ptw-skeleton ptw-skeleton-row short"></div>
      <div class="ptw-skeleton ptw-skeleton-row"></div>
      <div class="ptw-skeleton ptw-skeleton-row short"></div>
      <div class="ptw-skeleton ptw-skeleton-row"></div>
    </div>
  </div>

  <!-- Footer -->
  <div class="ptw-footer">
    <span class="ptw-footer-note" id="ptw-timestamp">Loading...</span>
    <a href="https://terminal.holygrade.com" class="ptw-footer-link" target="_blank" rel="noopener">
      Powered by OPTCG Terminal &rarr;
    </a>
  </div>
</div>

<script>
(function() {
  'use strict';

  var API_BASE = 'https://optcg-terminal.onrender.com';

  var KNOWN_SETS = [
    { code: 'OP15', name: 'A Spark of Rebellion' },
    { code: 'OP14', name: 'The Strongest Battlefield' },
    { code: 'OP13', name: 'Carrying on His Will' },
    { code: 'OP12', name: 'Heavenly Demon' },
    { code: 'OP11', name: 'Fist of Divine Speed' },
    { code: 'OP10', name: 'Royal Blood' },
    { code: 'OP09', name: 'The Four Emperors' },
    { code: 'OP08', name: 'Two Legends' },
    { code: 'OP07', name: '500 Years in the Future' },
    { code: 'OP06', name: 'Wings of the Captain' },
    { code: 'EB04', name: 'Egghead Crisis' },
    { code: 'EB03', name: 'Extreme Bond' },
    { code: 'EB02', name: 'Extra Booster 02' },
    { code: 'EB01', name: 'Memorial Collection' },
  ];

  var $ = function(id) { return document.getElementById(id); };
  var esc = function(s) { return String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); };
  var fmtEur = function(v) { return v == null ? '\u2014' : '\u20AC' + Number(v).toLocaleString('de-DE', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); };

  function rarityBadge(r) {
    if (!r) return '';
    var key = r.toLowerCase();
    var cls = key === 'sec' ? 'sec' : key === 'sr' ? 'sr' : key === 'leader' ? 'leader' : key === 'rare' ? 'rare' : '';
    if (!cls) return '';
    return ' <span class="ptw-rarity ptw-rarity-' + cls + '">' + esc(r) + '</span>';
  }

  function cardImg(url, name) {
    if (url) {
      return '<img class="ptw-card-img" src="' + esc(url) + '" alt="' + esc(name) + '" loading="lazy" onerror="this.outerHTML=\'<div class=ptw-card-img-placeholder>&#127183;</div>\'" />';
    }
    return '<div class="ptw-card-img-placeholder">&#127183;</div>';
  }

  function getSetFromURL() {
    var params = new URLSearchParams(window.location.search);
    var set = params.get('set');
    if (set) return set.toUpperCase();
    var sku = params.get('sku') || '';
    var pattern = /(OP\d{2}|EB\d{2}|PRB\d{2}|ST\d{2})/i;
    var match = sku.match(pattern);
    return match ? match[1].toUpperCase() : null;
  }

  async function fetchJSON(url) {
    var res = await fetch(url);
    if (!res.ok) throw new Error('API error: ' + res.status);
    return res.json();
  }

  function renderStats(sealed, cards) {
    var statsEl = $('ptw-stats');
    var box = sealed.find(function(p) { return p.product_type && p.product_type.toLowerCase().indexOf('booster box') >= 0; });
    var caseP = sealed.find(function(p) { return p.product_type && p.product_type.toLowerCase().indexOf('case') >= 0; });

    var priced = cards.filter(function(c) { return c.eu_cardmarket_7d_avg != null; });
    var avgTop5 = priced.length > 0
      ? priced.reduce(function(s, c) { return s + c.eu_cardmarket_7d_avg; }, 0) / priced.length
      : null;

    var trendText = '\u2014';
    var trendClass = '';
    if (box && box.eu_7d_avg != null && box.eu_30d_avg != null) {
      var diff = ((box.eu_7d_avg - box.eu_30d_avg) / box.eu_30d_avg * 100);
      if (diff > 1) { trendText = '\u2191 +' + diff.toFixed(1) + '%'; trendClass = 'positive'; }
      else if (diff < -1) { trendText = '\u2193 ' + diff.toFixed(1) + '%'; trendClass = 'negative'; }
      else { trendText = '\u2192 Stable'; trendClass = ''; }
    }

    statsEl.innerHTML = ''
      + '<div class="ptw-stat">'
      +   '<div class="ptw-stat-label">Booster Box</div>'
      +   '<div class="ptw-stat-value accent">' + (box ? fmtEur(box.eu_price) : '\u2014') + '</div>'
      +   '<div class="ptw-stat-sub">' + (box && box.eu_source ? esc(box.eu_source) : 'Market price') + '</div>'
      + '</div>'
      + '<div class="ptw-stat">'
      +   '<div class="ptw-stat-label">Case</div>'
      +   '<div class="ptw-stat-value">' + (caseP ? fmtEur(caseP.eu_price) : '\u2014') + '</div>'
      +   '<div class="ptw-stat-sub">' + (caseP && caseP.eu_source ? esc(caseP.eu_source) : 'Market price') + '</div>'
      + '</div>'
      + '<div class="ptw-stat highlight">'
      +   '<div class="ptw-stat-label">Avg Top 5</div>'
      +   '<div class="ptw-stat-value accent">' + (avgTop5 != null ? fmtEur(avgTop5) : '\u2014') + '</div>'
      +   '<div class="ptw-stat-sub">Highest-value cards</div>'
      + '</div>'
      + '<div class="ptw-stat">'
      +   '<div class="ptw-stat-label">Box Trend</div>'
      +   '<div class="ptw-stat-value ' + trendClass + '">' + trendText + '</div>'
      +   '<div class="ptw-stat-sub">7d vs 30d</div>'
      + '</div>';
  }

  function renderCards(cards) {
    var section = $('ptw-cards-section');
    if (!cards.length) {
      section.innerHTML = '<div class="ptw-error">No card data available for this set.</div>';
      return;
    }

    var html = '<div class="ptw-section-title">'
      + '<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 9L4.5 5.5L7 7L10 2.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>'
      + 'Top Cards by Market Price'
      + '</div>';

    html += '<table class="ptw-table"><thead><tr>'
      + '<th>Card</th><th>Set</th><th>Rarity</th><th>EU Price</th>'
      + '</tr></thead><tbody>';

    cards.forEach(function(c) {
      var price = c.eu_cardmarket_7d_avg != null ? fmtEur(c.eu_cardmarket_7d_avg) : '\u2014';
      html += '<tr>'
        + '<td><div class="ptw-card-cell">'
        +   cardImg(c.image_url, c.name)
        +   '<div>'
        +     '<div class="ptw-card-name">' + esc(c.name) + '</div>'
        +     '<div class="ptw-card-meta">' + esc(c.card_id) + '</div>'
        +   '</div>'
        + '</div></td>'
        + '<td>' + esc(c.set_code || '') + '</td>'
        + '<td>' + esc(c.rarity || '') + rarityBadge(c.rarity) + '</td>'
        + '<td><span class="ptw-card-price">' + price + '</span></td>'
        + '</tr>';
    });

    html += '</tbody></table>';
    section.innerHTML = html;
  }

  function renderPicker() {
    $('ptw-set-bar').innerHTML = '<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M6 2v8M2 6h8" stroke="#e8a040" stroke-width="1.5" stroke-linecap="round"/></svg>'
      + ' <span style="color:#e8a040;">No set specified.</span> Choose a set or add <code style="background:#161a19;padding:2px 6px;border-radius:3px;font-size:11px;">?set=OP13</code> to the URL.';

    var html = '<div class="ptw-section-title">Select a Set</div><div class="ptw-picker">';
    KNOWN_SETS.forEach(function(s) {
      html += '<button class="ptw-picker-btn" data-set="' + s.code + '">'
        + '<div class="ptw-picker-name">' + esc(s.code) + '</div>'
        + '<div class="ptw-picker-sub">' + esc(s.name) + '</div>'
        + '</button>';
    });
    html += '</div>';

    $('ptw-stats').style.display = 'none';
    $('ptw-cards-section').innerHTML = html;

    document.querySelectorAll('.ptw-picker-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        loadSetData(btn.getAttribute('data-set'));
      });
    });
  }

  function renderError(msg) {
    $('ptw-stats').innerHTML = '';
    $('ptw-stats').style.display = 'none';
    $('ptw-cards-section').innerHTML = '<div class="ptw-error">'
      + '<strong>Unable to load data</strong>'
      + esc(msg || 'Please try again later.')
      + '</div>';
  }

  async function loadSetData(setCode) {
    $('ptw-stats').style.display = '';
    $('ptw-stats').innerHTML = '<div class="ptw-stat"><div class="ptw-skeleton ptw-skeleton-stat"></div></div>'
      + '<div class="ptw-stat"><div class="ptw-skeleton ptw-skeleton-stat"></div></div>'
      + '<div class="ptw-stat"><div class="ptw-skeleton ptw-skeleton-stat"></div></div>'
      + '<div class="ptw-stat"><div class="ptw-skeleton ptw-skeleton-stat"></div></div>';
    $('ptw-cards-section').innerHTML = '<div class="ptw-skeleton ptw-skeleton-row"></div>'
      + '<div class="ptw-skeleton ptw-skeleton-row short"></div>'
      + '<div class="ptw-skeleton ptw-skeleton-row"></div>';

    var setInfo = KNOWN_SETS.find(function(s) { return s.code === setCode; });
    var setName = setInfo ? setCode + ' ' + setInfo.name : setCode;
    $('ptw-set-bar').innerHTML = '<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><circle cx="6" cy="6" r="2" fill="#00e5c0"/></svg>'
      + ' Showing live data for: <strong>' + esc(setName) + '</strong>';

    try {
      var results = await Promise.all([
        fetchJSON(API_BASE + '/api/cards/sealed?set_code=' + encodeURIComponent(setCode) + '&limit=20'),
        fetchJSON(API_BASE + '/api/cards/browse?set_code=' + encodeURIComponent(setCode) + '&limit=5&sort=eu_cardmarket_7d_avg&order=desc'),
      ]);

      renderStats(results[0].products || [], results[1].cards || []);
      renderCards(results[1].cards || []);

      $('ptw-timestamp').textContent = 'Updated: ' + new Date().toLocaleString('en-GB', {
        day: 'numeric', month: 'short', year: 'numeric',
        hour: '2-digit', minute: '2-digit'
      });

      var footerLink = document.querySelector('.ptw-footer-link');
      if (footerLink) {
        footerLink.textContent = 'View full ' + setCode + ' data \u2192';
      }
    } catch (err) {
      renderError('Could not connect to OPTCG Terminal. ' + (err.message || ''));
    }
  }

  // Init: read set from URL params
  var setCode = getSetFromURL();
  if (setCode) {
    loadSetData(setCode);
  } else {
    renderPicker();
  }
})();
</script>
</body>
</html>
