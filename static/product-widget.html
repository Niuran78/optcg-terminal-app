<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HOLYGRADE — Live Market Data</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    margin: 0; padding: 20px;
    background: transparent;
    display: flex; justify-content: center;
  }

  /* ── Container ─────────────────────────────────────────────── */
  .ptw {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #000000;
    border: 1px solid #222222;
    border-radius: 6px;
    overflow: hidden;
    max-width: 720px;
    width: 100%;
    color: #ffffff;
  }

  /* ── Header ────────────────────────────────────────────────── */
  .ptw-header {
    background: #000000;
    border-bottom: 1px solid #222222;
    padding: 18px 24px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .ptw-header-brand {
    display: flex; flex-direction: column; gap: 2px;
  }
  .ptw-header-brand h3 {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 14px; font-weight: 700; color: #c9a84c;
    letter-spacing: 0.12em; text-transform: uppercase;
  }
  .ptw-header-brand p {
    font-size: 10px; font-weight: 600; color: #666666;
    letter-spacing: 0.14em; text-transform: uppercase;
  }
  .ptw-live-badge {
    margin-left: auto;
    background: rgba(201,168,76,0.08);
    border: 1px solid rgba(201,168,76,0.25);
    color: #c9a84c;
    font-size: 10px; font-weight: 700;
    letter-spacing: 0.1em; text-transform: uppercase;
    padding: 4px 10px; border-radius: 4px;
    display: flex; align-items: center; gap: 6px;
  }
  .ptw-live-dot {
    width: 5px; height: 5px;
    background: #c9a84c; border-radius: 50%;
    animation: ptw-pulse 2s infinite;
  }
  @keyframes ptw-pulse { 0%,100%{opacity:1} 50%{opacity:0.25} }

  /* ── Set banner ────────────────────────────────────────────── */
  .ptw-set-bar {
    padding: 14px 24px;
    background: #0a0a0a;
    border-bottom: 1px solid #222222;
    border-left: 4px solid #c9a84c;
    font-size: 12px;
    color: #666666;
    display: flex; align-items: baseline; gap: 8px;
  }
  .ptw-set-bar strong {
    font-family: 'Playfair Display', Georgia, serif;
    color: #ffffff; font-weight: 500;
    font-size: 15px;
  }
  .ptw-set-bar-label {
    font-size: 10px; font-weight: 600;
    letter-spacing: 0.1em; text-transform: uppercase;
    color: #666666;
  }

  /* ── Body ───────────────────────────────────────────────────── */
  .ptw-body { padding: 24px; }

  /* ── Stats grid ─────────────────────────────────────────────── */
  .ptw-stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 28px;
  }
  .ptw-stat {
    background: #141414;
    border: 1px solid #2a2a2a;
    border-radius: 6px;
    padding: 16px 12px;
    text-align: center;
  }
  .ptw-stat.highlight {
    border-color: rgba(201,168,76,0.3);
    background: rgba(201,168,76,0.03);
  }
  .ptw-stat-label {
    font-size: 10px; font-weight: 600;
    letter-spacing: 0.1em; text-transform: uppercase;
    color: #888888;
    margin-bottom: 8px;
  }
  .ptw-stat-value {
    font-family: 'Inter', sans-serif;
    font-size: 22px; font-weight: 700; color: #ffffff; line-height: 1;
  }
  .ptw-stat-value.accent { color: #c9a84c; }
  .ptw-stat-value.positive { color: #c9a84c; }
  .ptw-stat-value.negative { color: #888888; }
  .ptw-stat-sub {
    font-size: 10px; color: #555555; margin-top: 6px;
  }

  /* ── Section title ──────────────────────────────────────────── */
  .ptw-section-title {
    font-size: 10px; font-weight: 600;
    letter-spacing: 0.12em; text-transform: uppercase;
    color: #888888;
    margin-bottom: 14px;
    padding-bottom: 10px;
    border-bottom: 1px solid #1a1a1a;
    display: flex; align-items: center; gap: 8px;
  }

  /* ── Cards table ────────────────────────────────────────────── */
  .ptw-table { width: 100%; border-collapse: collapse; }
  .ptw-table th {
    font-size: 10px; font-weight: 600;
    letter-spacing: 0.1em; text-transform: uppercase;
    color: #555555; text-align: left;
    padding: 8px 10px; border-bottom: 1px solid #222222;
  }
  .ptw-table th:last-child { text-align: right; }
  .ptw-table td {
    font-size: 13px; padding: 12px 10px;
    border-bottom: 1px solid #1a1a1a;
    color: #aaaaaa;
    vertical-align: middle;
  }
  .ptw-table tr:last-child td { border-bottom: none; }
  .ptw-table tr {
    transition: background 150ms ease;
  }
  .ptw-table tbody tr:hover {
    background: rgba(201,168,76,0.03);
  }
  .ptw-table td:last-child { text-align: right; }

  .ptw-card-cell {
    display: flex; align-items: center; gap: 12px;
  }
  .ptw-card-img {
    width: 36px; height: 50px;
    border-radius: 4px; object-fit: cover;
    background: #141414;
    flex-shrink: 0;
  }
  .ptw-card-img-placeholder {
    width: 36px; height: 50px;
    border-radius: 4px;
    background: #141414;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0;
    color: #333333;
  }
  .ptw-card-name {
    font-weight: 600; color: #ffffff;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    max-width: 200px;
    font-size: 13px;
  }
  .ptw-card-meta {
    font-size: 10px; color: #555555; margin-top: 2px;
    font-weight: 500;
  }
  .ptw-card-set {
    color: #c9a84c; font-weight: 600; font-size: 12px;
    letter-spacing: 0.02em;
  }
  .ptw-card-price {
    font-weight: 700; color: #ffffff; white-space: nowrap;
    font-size: 14px;
  }

  /* ── Rarity badges ──────────────────────────────────────────── */
  .ptw-rarity {
    display: inline-block; font-size: 9px; font-weight: 700;
    padding: 2px 6px; border-radius: 3px;
    margin-left: 4px; vertical-align: middle;
    letter-spacing: 0.04em;
  }
  .ptw-rarity-sec    { background: rgba(201,168,76,0.12);  color: #c9a84c; }
  .ptw-rarity-sr     { background: rgba(255,255,255,0.06); color: #999999; }
  .ptw-rarity-leader { background: rgba(201,168,76,0.08);  color: #d4b35e; }
  .ptw-rarity-rare   { background: rgba(255,255,255,0.04); color: #777777; }

  /* ── Set picker ─────────────────────────────────────────────── */
  .ptw-picker {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 10px;
    margin-top: 16px;
  }
  .ptw-picker-btn {
    background: #141414;
    border: 1px solid #2a2a2a;
    border-radius: 6px;
    padding: 14px 14px;
    cursor: pointer;
    transition: all 200ms ease;
    text-align: left;
    color: #ffffff;
    font-family: 'Inter', sans-serif;
  }
  .ptw-picker-btn:hover {
    border-color: rgba(201,168,76,0.4);
    background: #1a1a1a;
  }
  .ptw-picker-name {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 14px; font-weight: 500;
  }
  .ptw-picker-sub {
    font-size: 11px; color: #666666; margin-top: 4px;
    font-weight: 400;
  }

  /* ── Loading skeleton ───────────────────────────────────────── */
  .ptw-skeleton {
    background: linear-gradient(90deg, #141414 25%, #1e1e1e 50%, #141414 75%);
    background-size: 200% 100%;
    animation: ptw-shimmer 1.8s infinite ease-in-out;
    border-radius: 4px;
  }
  @keyframes ptw-shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
  .ptw-skeleton-stat { height: 52px; }
  .ptw-skeleton-row { height: 14px; margin-bottom: 14px; }
  .ptw-skeleton-row.short { width: 55%; }

  /* ── Error state ────────────────────────────────────────────── */
  .ptw-error {
    text-align: center; padding: 32px 16px;
    color: #666666; font-size: 13px;
  }
  .ptw-error strong {
    color: #aaaaaa; display: block;
    margin-bottom: 8px; font-size: 14px;
    font-family: 'Playfair Display', Georgia, serif;
    font-weight: 500;
  }

  /* ── Footer ─────────────────────────────────────────────────── */
  .ptw-footer {
    border-top: 1px solid rgba(201,168,76,0.15);
    padding: 12px 24px;
    display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: 8px;
    background: #000000;
  }
  .ptw-footer-note { font-size: 10px; color: #444444; }
  .ptw-footer-link {
    font-size: 11px; font-weight: 600;
    color: #c9a84c; text-decoration: none;
    letter-spacing: 0.02em;
    transition: color 150ms ease;
  }
  .ptw-footer-link:hover { color: #d4b86a; }

  /* ── Responsive ─────────────────────────────────────────────── */
  @media (max-width: 560px) {
    .ptw-stats { grid-template-columns: repeat(2, 1fr); }
    .ptw-picker { grid-template-columns: repeat(2, 1fr); }
    .ptw-card-name { max-width: 110px; }
    .ptw-header { padding: 14px 16px; }
    .ptw-body { padding: 16px; }
    .ptw-set-bar { padding: 12px 16px; }
    .ptw-footer { padding: 10px 16px; }
    .ptw-stat-value { font-size: 18px; }
  }

  @media (max-width: 360px) {
    .ptw-header-brand h3 { font-size: 12px; }
    .ptw-live-badge { font-size: 9px; padding: 3px 7px; }
  }
</style>
</head>
<body>

<div class="ptw" id="ptw-root">

  <!-- Header -->
  <div class="ptw-header">
    <div class="ptw-header-brand">
      <h3>Holygrade &times; OPTCG Terminal</h3>
      <p>Live Market Data</p>
    </div>
    <div class="ptw-live-badge"><div class="ptw-live-dot"></div>Live</div>
  </div>

  <!-- Set banner -->
  <div class="ptw-set-bar" id="ptw-set-bar">
    <span class="ptw-set-bar-label">Loading</span>
  </div>

  <!-- Body -->
  <div class="ptw-body" id="ptw-body">
    <div class="ptw-stats" id="ptw-stats">
      <div class="ptw-stat"><div class="ptw-skeleton ptw-skeleton-stat"></div></div>
      <div class="ptw-stat"><div class="ptw-skeleton ptw-skeleton-stat"></div></div>
      <div class="ptw-stat"><div class="ptw-skeleton ptw-skeleton-stat"></div></div>
      <div class="ptw-stat"><div class="ptw-skeleton ptw-skeleton-stat"></div></div>
    </div>
    <div id="ptw-cards-section">
      <div class="ptw-skeleton ptw-skeleton-row"></div>
      <div class="ptw-skeleton ptw-skeleton-row short"></div>
      <div class="ptw-skeleton ptw-skeleton-row"></div>
      <div class="ptw-skeleton ptw-skeleton-row short"></div>
      <div class="ptw-skeleton ptw-skeleton-row"></div>
    </div>
  </div>

  <!-- Footer -->
  <div class="ptw-footer">
    <span class="ptw-footer-note" id="ptw-timestamp">Loading...</span>
    <a href="https://terminal.holygrade.com" class="ptw-footer-link" target="_blank" rel="noopener">
      Powered by OPTCG Terminal &rarr;
    </a>
  </div>
</div>

<script>
(function() {
  'use strict';

  var API_BASE = 'https://optcg-terminal.onrender.com';

  var KNOWN_SETS = [
    { code: 'OP15', name: 'A Spark of Rebellion' },
    { code: 'OP14', name: 'The Strongest Battlefield' },
    { code: 'OP13', name: 'Carrying on His Will' },
    { code: 'OP12', name: 'Heavenly Demon' },
    { code: 'OP11', name: 'Fist of Divine Speed' },
    { code: 'OP10', name: 'Royal Blood' },
    { code: 'OP09', name: 'The Four Emperors' },
    { code: 'OP08', name: 'Two Legends' },
    { code: 'OP07', name: '500 Years in the Future' },
    { code: 'OP06', name: 'Wings of the Captain' },
    { code: 'EB04', name: 'Egghead Crisis' },
    { code: 'EB03', name: 'Extreme Bond' },
    { code: 'EB02', name: 'Extra Booster 02' },
    { code: 'EB01', name: 'Memorial Collection' },
  ];

  var $ = function(id) { return document.getElementById(id); };
  var esc = function(s) { return String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); };
  var fmtEur = function(v) { return v == null ? '\u2014' : '\u20AC' + Number(v).toLocaleString('de-DE', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); };

  function rarityBadge(r) {
    if (!r) return '';
    var key = r.toLowerCase();
    var cls = key === 'sec' ? 'sec' : key === 'sr' ? 'sr' : key === 'leader' ? 'leader' : key === 'rare' ? 'rare' : '';
    if (!cls) return '';
    return ' <span class="ptw-rarity ptw-rarity-' + cls + '">' + esc(r) + '</span>';
  }

  function cardImg(url, name) {
    if (url) {
      return '<img class="ptw-card-img" src="' + esc(url) + '" alt="' + esc(name) + '" loading="lazy" onerror="this.outerHTML=\'<div class=ptw-card-img-placeholder>&#9830;</div>\'" />';
    }
    return '<div class="ptw-card-img-placeholder">&#9830;</div>';
  }

  function getSetFromURL() {
    var params = new URLSearchParams(window.location.search);
    var set = params.get('set');
    if (set) return set.toUpperCase();

    // Try SKU, handle, then tags (in that order of reliability)
    var candidates = [
      params.get('sku') || '',
      params.get('handle') || '',
      params.get('tags') || ''
    ];

    // Match OP13, OP-13, op_13, EB01, PRB02, ST12, etc.
    // Also match "OP 13" with spaces.
    var pattern = /\b(OP|EB|PRB|ST)[\s\-_]*(\d{1,2})\b/i;
    for (var i = 0; i < candidates.length; i++) {
      var m = candidates[i].match(pattern);
      if (m) {
        var prefix = m[1].toUpperCase();
        var num = m[2].padStart(2, '0');
        return prefix + num;
      }
    }
    return null;
  }

  async function fetchJSON(url) {
    var res = await fetch(url);
    if (!res.ok) throw new Error('API error: ' + res.status);
    return res.json();
  }

  function renderStats(sealed, cards) {
    var statsEl = $('ptw-stats');
    var box = sealed.find(function(p) { return p.product_type && p.product_type.toLowerCase().indexOf('booster box') >= 0; });
    var caseP = sealed.find(function(p) { return p.product_type && p.product_type.toLowerCase().indexOf('case') >= 0; });

    var priced = cards.filter(function(c) { return c.eu_cardmarket_7d_avg != null; });
    var avgTop5 = priced.length > 0
      ? priced.reduce(function(s, c) { return s + c.eu_cardmarket_7d_avg; }, 0) / priced.length
      : null;

    var trendText = '\u2014';
    var trendClass = '';
    if (box && box.eu_7d_avg != null && box.eu_30d_avg != null) {
      var diff = ((box.eu_7d_avg - box.eu_30d_avg) / box.eu_30d_avg * 100);
      if (diff > 1) { trendText = '\u2191 +' + diff.toFixed(1) + '%'; trendClass = 'positive'; }
      else if (diff < -1) { trendText = '\u2193 ' + diff.toFixed(1) + '%'; trendClass = 'negative'; }
      else { trendText = '\u2192 Stable'; trendClass = ''; }
    }

    statsEl.innerHTML = ''
      + '<div class="ptw-stat">'
      +   '<div class="ptw-stat-label">Booster Box</div>'
      +   '<div class="ptw-stat-value accent">' + (box ? fmtEur(box.eu_price) : '\u2014') + '</div>'
      +   '<div class="ptw-stat-sub">' + (box && box.eu_source ? esc(box.eu_source) : 'Cardmarket') + '</div>'
      + '</div>'
      + '<div class="ptw-stat">'
      +   '<div class="ptw-stat-label">Case</div>'
      +   '<div class="ptw-stat-value">' + (caseP ? fmtEur(caseP.eu_price) : '\u2014') + '</div>'
      +   '<div class="ptw-stat-sub">' + (caseP && caseP.eu_source ? esc(caseP.eu_source) : 'Cardmarket') + '</div>'
      + '</div>'
      + '<div class="ptw-stat highlight">'
      +   '<div class="ptw-stat-label">Avg Top 5</div>'
      +   '<div class="ptw-stat-value accent">' + (avgTop5 != null ? fmtEur(avgTop5) : '\u2014') + '</div>'
      +   '<div class="ptw-stat-sub">Highest-value cards</div>'
      + '</div>'
      + '<div class="ptw-stat">'
      +   '<div class="ptw-stat-label">Box Trend</div>'
      +   '<div class="ptw-stat-value ' + trendClass + '">' + trendText + '</div>'
      +   '<div class="ptw-stat-sub">7d vs 30d avg</div>'
      + '</div>';
  }

  function renderCards(cards) {
    var section = $('ptw-cards-section');
    if (!cards.length) {
      section.innerHTML = '<div class="ptw-error"><strong>No Data Available</strong>Card pricing data is not yet available for this set.</div>';
      return;
    }

    var html = '<div class="ptw-section-title">'
      + '<svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M1 8L3.5 4.5L6 6L9 2" stroke="#c9a84c" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>'
      + 'Top Cards by Market Price'
      + '</div>';

    html += '<table class="ptw-table"><thead><tr>'
      + '<th>Card</th><th>Set</th><th>Rarity</th><th>EU Price</th>'
      + '</tr></thead><tbody>';

    cards.forEach(function(c) {
      var price = c.eu_cardmarket_7d_avg != null ? fmtEur(c.eu_cardmarket_7d_avg) : '\u2014';
      html += '<tr>'
        + '<td><div class="ptw-card-cell">'
        +   cardImg(c.image_url, c.name)
        +   '<div>'
        +     '<div class="ptw-card-name">' + esc(c.name) + '</div>'
        +     '<div class="ptw-card-meta">' + esc(c.card_id) + '</div>'
        +   '</div>'
        + '</div></td>'
        + '<td><span class="ptw-card-set">' + esc(c.set_code || '') + '</span></td>'
        + '<td>' + esc(c.rarity || '') + rarityBadge(c.rarity) + '</td>'
        + '<td><span class="ptw-card-price">' + price + '</span></td>'
        + '</tr>';
    });

    html += '</tbody></table>';
    section.innerHTML = html;
  }

  function renderPicker() {
    $('ptw-set-bar').innerHTML = '<span class="ptw-set-bar-label">Select a set to view live pricing</span>';

    var html = '<div class="ptw-section-title">'
      + '<svg width="10" height="10" viewBox="0 0 10 10" fill="none"><rect x="1" y="1" width="8" height="8" rx="1.5" stroke="#c9a84c" stroke-width="1"/></svg>'
      + 'Available Sets</div><div class="ptw-picker">';
    KNOWN_SETS.forEach(function(s) {
      html += '<button class="ptw-picker-btn" data-set="' + s.code + '">'
        + '<div class="ptw-picker-name">' + esc(s.code) + '</div>'
        + '<div class="ptw-picker-sub">' + esc(s.name) + '</div>'
        + '</button>';
    });
    html += '</div>';

    $('ptw-stats').style.display = 'none';
    $('ptw-cards-section').innerHTML = html;

    document.querySelectorAll('.ptw-picker-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        loadSetData(btn.getAttribute('data-set'));
      });
    });
  }

  function renderError(msg) {
    $('ptw-stats').innerHTML = '';
    $('ptw-stats').style.display = 'none';
    $('ptw-cards-section').innerHTML = '<div class="ptw-error">'
      + '<strong>Unable to Load Data</strong>'
      + esc(msg || 'Please try again later.')
      + '</div>';
  }

  async function loadSetData(setCode) {
    $('ptw-stats').style.display = '';
    $('ptw-stats').innerHTML = '<div class="ptw-stat"><div class="ptw-skeleton ptw-skeleton-stat"></div></div>'
      + '<div class="ptw-stat"><div class="ptw-skeleton ptw-skeleton-stat"></div></div>'
      + '<div class="ptw-stat"><div class="ptw-skeleton ptw-skeleton-stat"></div></div>'
      + '<div class="ptw-stat"><div class="ptw-skeleton ptw-skeleton-stat"></div></div>';
    $('ptw-cards-section').innerHTML = '<div class="ptw-skeleton ptw-skeleton-row"></div>'
      + '<div class="ptw-skeleton ptw-skeleton-row short"></div>'
      + '<div class="ptw-skeleton ptw-skeleton-row"></div>';

    var setInfo = KNOWN_SETS.find(function(s) { return s.code === setCode; });
    var setName = setInfo ? setInfo.name : setCode;
    $('ptw-set-bar').innerHTML = '<span class="ptw-set-bar-label">Showing live data for</span> '
      + '<strong>' + esc(setCode) + ' \u2014 ' + esc(setName) + '</strong>';

    try {
      var results = await Promise.all([
        fetchJSON(API_BASE + '/api/cards/sealed?set_code=' + encodeURIComponent(setCode) + '&limit=20'),
        fetchJSON(API_BASE + '/api/cards/browse?set_code=' + encodeURIComponent(setCode) + '&limit=5&sort=eu_cardmarket_7d_avg&order=desc'),
      ]);

      renderStats(results[0].products || [], results[1].cards || []);
      renderCards(results[1].cards || []);

      $('ptw-timestamp').textContent = 'Updated ' + new Date().toLocaleString('en-GB', {
        day: 'numeric', month: 'short', year: 'numeric',
        hour: '2-digit', minute: '2-digit'
      });

      var footerLink = document.querySelector('.ptw-footer-link');
      if (footerLink) {
        footerLink.textContent = 'View full ' + setCode + ' data \u2192';
      }
    } catch (err) {
      renderError('Could not connect to OPTCG Terminal. ' + (err.message || ''));
    }
  }

  // Init
  var setCode = getSetFromURL();
  if (setCode) {
    loadSetData(setCode);
  } else {
    renderPicker();
  }
})();
</script>
</body>
</html>
