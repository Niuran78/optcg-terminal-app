<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HOLYGRADE — Live Market Data</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    margin: 0; padding: 20px;
    background: transparent;
    display: flex; justify-content: center;
  }

  /* ── Container ─────────────────────────────────────────────── */
  .ptw {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #000000;
    border: 1px solid #222222;
    border-radius: 6px;
    overflow: hidden;
    max-width: 720px;
    width: 100%;
    color: #ffffff;
  }

  /* ── Header ────────────────────────────────────────────────── */
  .ptw-header {
    background: #000000;
    border-bottom: 1px solid #222222;
    padding: 18px 24px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .ptw-header-brand {
    display: flex; flex-direction: column; gap: 2px;
  }
  .ptw-header-brand h3 {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 14px; font-weight: 700; color: #c9a84c;
    letter-spacing: 0.12em; text-transform: uppercase;
  }
  .ptw-header-brand p {
    font-size: 10px; font-weight: 600; color: #666666;
    letter-spacing: 0.14em; text-transform: uppercase;
  }
  .ptw-live-badge {
    margin-left: auto;
    background: rgba(201,168,76,0.08);
    border: 1px solid rgba(201,168,76,0.25);
    color: #c9a84c;
    font-size: 10px; font-weight: 700;
    letter-spacing: 0.1em; text-transform: uppercase;
    padding: 4px 10px; border-radius: 4px;
    display: flex; align-items: center; gap: 6px;
  }
  .ptw-live-dot {
    width: 5px; height: 5px;
    background: #c9a84c; border-radius: 50%;
    animation: ptw-pulse 2s infinite;
  }
  @keyframes ptw-pulse { 0%,100%{opacity:1} 50%{opacity:0.25} }

  /* ── Set banner ────────────────────────────────────────────── */
  .ptw-set-bar {
    padding: 14px 24px;
    background: #0a0a0a;
    border-bottom: 1px solid #222222;
    border-left: 4px solid #c9a84c;
    font-size: 12px;
    color: #666666;
    display: flex; align-items: baseline; gap: 8px;
  }
  .ptw-set-bar strong {
    font-family: 'Playfair Display', Georgia, serif;
    color: #ffffff; font-weight: 500;
    font-size: 15px;
  }
  .ptw-set-bar-label {
    font-size: 10px; font-weight: 600;
    letter-spacing: 0.1em; text-transform: uppercase;
    color: #666666;
  }

  /* ── Body ───────────────────────────────────────────────────── */
  .ptw-body { padding: 24px; }

  /* ── Sealed product rows ─────────────────────────────────────── */
  .ptw-sealed-section { margin-bottom: 28px; }
  .ptw-sealed-row {
    margin-bottom: 16px;
  }
  .ptw-sealed-row:last-child { margin-bottom: 0; }
  .ptw-sealed-type {
    font-size: 10px; font-weight: 700;
    letter-spacing: 0.12em; text-transform: uppercase;
    color: #888888;
    margin-bottom: 8px;
    padding-bottom: 6px;
    border-bottom: 1px solid #1a1a1a;
  }
  .ptw-sealed-cols {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .ptw-lang-card {
    background: #141414;
    border: 1px solid #2a2a2a;
    border-radius: 6px;
    padding: 14px 12px;
  }
  .ptw-lang-card.jp { border-left: 3px solid #c9a84c; }
  .ptw-lang-card.en { border-left: 3px solid #666666; }
  .ptw-lang-label {
    font-size: 9px; font-weight: 700;
    letter-spacing: 0.12em; text-transform: uppercase;
    margin-bottom: 6px;
  }
  .ptw-lang-card.jp .ptw-lang-label { color: #c9a84c; }
  .ptw-lang-card.en .ptw-lang-label { color: #888888; }
  .ptw-lang-price {
    font-family: 'Inter', sans-serif;
    font-size: 20px; font-weight: 700; color: #ffffff; line-height: 1;
  }
  .ptw-lang-price.accent { color: #c9a84c; }
  .ptw-lang-price.na { color: #333333; font-size: 16px; }
  .ptw-lang-usd {
    font-size: 11px; color: #555555; margin-top: 4px;
    font-family: 'Inter', sans-serif;
  }
  .ptw-lang-source {
    font-size: 9px; color: #444444; margin-top: 4px;
  }

  /* ── Buy-link buttons ───────────────────────────── */
  .ptw-buy-row {
    display: flex; flex-wrap: wrap; gap: 6px;
    margin-top: 10px;
  }
  .ptw-buy-btn {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 5px 10px;
    font-size: 10px; font-weight: 600;
    letter-spacing: 0.03em;
    color: #c9a84c;
    background: rgba(201,168,76,0.08);
    border: 1px solid rgba(201,168,76,0.25);
    border-radius: 4px;
    text-decoration: none;
    transition: all 0.15s ease;
    white-space: nowrap;
  }
  .ptw-buy-btn:hover {
    background: rgba(201,168,76,0.16);
    border-color: rgba(201,168,76,0.45);
    color: #e8c968;
  }
  .ptw-buy-btn.primary {
    color: #0a0a0a;
    background: #c9a84c;
    border-color: #c9a84c;
  }
  .ptw-buy-btn.primary:hover {
    background: #e8c968;
    border-color: #e8c968;
  }
  .ptw-card-price-link {
    font-weight: 700; color: #c9a84c;
    text-decoration: none;
    white-space: nowrap;
    font-size: 14px;
    transition: color 0.15s ease;
  }
  .ptw-card-price-link:hover {
    color: #e8c968;
    text-decoration: underline;
  }

  /* ── Section title ──────────────────────────────────────────── */
  .ptw-section-title {
    font-size: 10px; font-weight: 600;
    letter-spacing: 0.12em; text-transform: uppercase;
    color: #888888;
    margin-bottom: 14px;
    padding-bottom: 10px;
    border-bottom: 1px solid #1a1a1a;
    display: flex; align-items: center; gap: 8px;
  }

  /* ── Cards table ────────────────────────────────────────────── */
  .ptw-table { width: 100%; border-collapse: collapse; }
  .ptw-table th {
    font-size: 10px; font-weight: 600;
    letter-spacing: 0.1em; text-transform: uppercase;
    color: #555555; text-align: left;
    padding: 8px 10px; border-bottom: 1px solid #222222;
  }
  .ptw-table th:last-child { text-align: right; }
  .ptw-table td {
    font-size: 13px; padding: 12px 10px;
    border-bottom: 1px solid #1a1a1a;
    color: #aaaaaa;
    vertical-align: middle;
  }
  .ptw-table tr:last-child td { border-bottom: none; }
  .ptw-table tr {
    transition: background 150ms ease;
  }
  .ptw-table tbody tr:hover {
    background: rgba(201,168,76,0.03);
  }
  .ptw-table td:last-child { text-align: right; }

  .ptw-card-cell {
    display: flex; align-items: center; gap: 12px;
  }
  .ptw-card-img {
    width: 36px; height: 50px;
    border-radius: 4px; object-fit: cover;
    background: #141414;
    flex-shrink: 0;
  }
  .ptw-card-img-placeholder {
    width: 36px; height: 50px;
    border-radius: 4px;
    background: #141414;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0;
    color: #333333;
  }
  .ptw-card-name {
    font-weight: 600; color: #ffffff;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    max-width: 200px;
    font-size: 13px;
  }
  .ptw-card-meta {
    font-size: 10px; color: #555555; margin-top: 2px;
    font-weight: 500;
  }
  .ptw-card-set {
    color: #c9a84c; font-weight: 600; font-size: 12px;
    letter-spacing: 0.02em;
  }
  .ptw-card-price {
    font-weight: 700; color: #ffffff; white-space: nowrap;
    font-size: 14px;
  }

  /* ── Rarity badges ──────────────────────────────────────────── */
  .ptw-rarity {
    display: inline-block; font-size: 9px; font-weight: 700;
    padding: 2px 6px; border-radius: 3px;
    margin-left: 4px; vertical-align: middle;
    letter-spacing: 0.04em;
  }
  .ptw-rarity-sec    { background: rgba(201,168,76,0.12);  color: #c9a84c; }
  .ptw-rarity-sr     { background: rgba(255,255,255,0.06); color: #999999; }
  .ptw-rarity-leader { background: rgba(201,168,76,0.08);  color: #d4b35e; }
  .ptw-rarity-rare   { background: rgba(255,255,255,0.04); color: #777777; }

  /* ── Set picker ─────────────────────────────────────────────── */
  .ptw-picker {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 10px;
    margin-top: 16px;
  }
  .ptw-picker-btn {
    background: #141414;
    border: 1px solid #2a2a2a;
    border-radius: 6px;
    padding: 14px 14px;
    cursor: pointer;
    transition: all 200ms ease;
    text-align: left;
    color: #ffffff;
    font-family: 'Inter', sans-serif;
  }
  .ptw-picker-btn:hover {
    border-color: rgba(201,168,76,0.4);
    background: #1a1a1a;
  }
  .ptw-picker-name {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 14px; font-weight: 500;
  }
  .ptw-picker-sub {
    font-size: 11px; color: #666666; margin-top: 4px;
    font-weight: 400;
  }

  /* ── Loading skeleton ───────────────────────────────────────── */
  .ptw-skeleton {
    background: linear-gradient(90deg, #141414 25%, #1e1e1e 50%, #141414 75%);
    background-size: 200% 100%;
    animation: ptw-shimmer 1.8s infinite ease-in-out;
    border-radius: 4px;
  }
  @keyframes ptw-shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
  .ptw-skeleton-stat { height: 52px; }
  .ptw-skeleton-row { height: 14px; margin-bottom: 14px; }
  .ptw-skeleton-row.short { width: 55%; }

  /* ── Error state ────────────────────────────────────────────── */
  .ptw-error {
    text-align: center; padding: 32px 16px;
    color: #666666; font-size: 13px;
  }
  .ptw-error strong {
    color: #aaaaaa; display: block;
    margin-bottom: 8px; font-size: 14px;
    font-family: 'Playfair Display', Georgia, serif;
    font-weight: 500;
  }

  /* ── Footer ─────────────────────────────────────────────────── */
  .ptw-footer {
    border-top: 1px solid rgba(201,168,76,0.15);
    padding: 12px 24px;
    display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: 8px;
    background: #000000;
  }
  .ptw-footer-note { font-size: 10px; color: #444444; }
  .ptw-footer-link {
    font-size: 11px; font-weight: 600;
    color: #c9a84c; text-decoration: none;
    letter-spacing: 0.02em;
    transition: color 150ms ease;
  }
  .ptw-footer-link:hover { color: #d4b86a; }

  /* ── Responsive ─────────────────────────────────────────────── */
  @media (max-width: 560px) {
    .ptw-sealed-cols { grid-template-columns: 1fr 1fr; }
    .ptw-lang-price { font-size: 16px; }
    .ptw-picker { grid-template-columns: repeat(2, 1fr); }
    .ptw-card-name { max-width: 110px; }
    .ptw-header { padding: 14px 16px; }
    .ptw-body { padding: 16px; }
    .ptw-set-bar { padding: 12px 16px; }
    .ptw-footer { padding: 10px 16px; }
    .ptw-stat-value { font-size: 18px; }
  }

  @media (max-width: 360px) {
    .ptw-header-brand h3 { font-size: 12px; }
    .ptw-live-badge { font-size: 9px; padding: 3px 7px; }
  }
</style>
</head>
<body>

<div class="ptw" id="ptw-root">

  <!-- Header -->
  <div class="ptw-header">
    <div class="ptw-header-brand">
      <h3>Holygrade Terminal</h3>
      <p>Live Market Data</p>
    </div>
    <div class="ptw-live-badge"><div class="ptw-live-dot"></div>Live</div>
  </div>

  <!-- Set banner -->
  <div class="ptw-set-bar" id="ptw-set-bar">
    <span class="ptw-set-bar-label">Loading</span>
  </div>

  <!-- Body -->
  <div class="ptw-body" id="ptw-body">
    <div class="ptw-sealed-section" id="ptw-sealed">
      <div class="ptw-skeleton ptw-skeleton-stat" style="height:80px;margin-bottom:12px;"></div>
      <div class="ptw-skeleton ptw-skeleton-stat" style="height:80px;"></div>
    </div>
    <div id="ptw-cards-section">
      <div class="ptw-skeleton ptw-skeleton-row"></div>
      <div class="ptw-skeleton ptw-skeleton-row short"></div>
      <div class="ptw-skeleton ptw-skeleton-row"></div>
      <div class="ptw-skeleton ptw-skeleton-row short"></div>
      <div class="ptw-skeleton ptw-skeleton-row"></div>
    </div>
  </div>

  <!-- Footer -->
  <div class="ptw-footer">
    <span class="ptw-footer-note" id="ptw-timestamp">Loading...</span>
    <span class="ptw-footer-link" style="cursor:default;">Powered by Holygrade Terminal</span>
  </div>
</div>

<script>
(function() {
  'use strict';

  var API_BASE = 'https://optcg-terminal.onrender.com';

  var KNOWN_SETS = [
    { code: 'OP15', name: 'A Spark of Rebellion' },
    { code: 'OP14', name: 'The Strongest Battlefield' },
    { code: 'OP13', name: 'Carrying on His Will' },
    { code: 'OP12', name: 'Heavenly Demon' },
    { code: 'OP11', name: 'Fist of Divine Speed' },
    { code: 'OP10', name: 'Royal Blood' },
    { code: 'OP09', name: 'The Four Emperors' },
    { code: 'OP08', name: 'Two Legends' },
    { code: 'OP07', name: '500 Years in the Future' },
    { code: 'OP06', name: 'Wings of the Captain' },
    { code: 'EB04', name: 'Egghead Crisis' },
    { code: 'EB03', name: 'Extreme Bond' },
    { code: 'EB02', name: 'Extra Booster 02' },
    { code: 'EB01', name: 'Memorial Collection' },
  ];

  var $ = function(id) { return document.getElementById(id); };
  var esc = function(s) { return String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); };
  var fmtEur = function(v) { return v == null ? '\u2014' : '\u20AC' + Number(v).toLocaleString('de-DE', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); };

  function rarityBadge(r) {
    if (!r) return '';
    var key = r.toLowerCase();
    var cls = key === 'sec' ? 'sec' : key === 'sr' ? 'sr' : key === 'leader' ? 'leader' : key === 'rare' ? 'rare' : '';
    if (!cls) return '';
    return ' <span class="ptw-rarity ptw-rarity-' + cls + '">' + esc(r) + '</span>';
  }

  function cardImg(url, name) {
    if (url) {
      return '<img class="ptw-card-img" src="' + esc(url) + '" alt="' + esc(name) + '" loading="lazy" onerror="this.outerHTML=\'<div class=ptw-card-img-placeholder>&#9830;</div>\'" />';
    }
    return '<div class="ptw-card-img-placeholder">&#9830;</div>';
  }

  function getSetFromURL() {
    var params = new URLSearchParams(window.location.search);
    var set = params.get('set');
    if (set) return set.toUpperCase();

    // Try SKU, handle, then tags (in that order of reliability)
    var candidates = [
      params.get('sku') || '',
      params.get('handle') || '',
      params.get('tags') || ''
    ];

    // Match OP13, OP-13, op_13, EB01, PRB02, ST12, etc.
    // Also match "OP 13" with spaces.
    var pattern = /\b(OP|EB|PRB|ST)[\s\-_]*(\d{1,2})\b/i;
    for (var i = 0; i < candidates.length; i++) {
      var m = candidates[i].match(pattern);
      if (m) {
        var prefix = m[1].toUpperCase();
        var num = m[2].padStart(2, '0');
        return prefix + num;
      }
    }
    return null;
  }

  async function fetchJSON(url) {
    var res = await fetch(url);
    if (!res.ok) throw new Error('API error: ' + res.status);
    return res.json();
  }

  var fmtUsd = function(v) { return v == null ? null : '$' + Number(v).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); };

  function buyLinksHtml(links) {
    if (!links) return '';
    var btns = [];
    if (links.pricecharting) {
      btns.push('<a href="' + links.pricecharting + '" target="_blank" rel="noopener nofollow" class="ptw-buy-btn" title="View on PriceCharting">PriceCharting ↗</a>');
    }
    if (links.cardmarket) {
      btns.push('<a href="' + links.cardmarket + '" target="_blank" rel="noopener nofollow" class="ptw-buy-btn primary" title="Buy on Cardmarket">Buy on Cardmarket ↗</a>');
    }
    if (links.tcgplayer) {
      btns.push('<a href="' + links.tcgplayer + '" target="_blank" rel="noopener nofollow" class="ptw-buy-btn primary" title="Buy on TCGPlayer">Buy on TCGPlayer ↗</a>');
    }
    return btns.length ? '<div class="ptw-buy-row">' + btns.join('') + '</div>' : '';
  }

  function renderLangCard(lang, data, isJp) {
    if (!data || data.price_eur == null) {
      return '<div class="ptw-lang-card ' + (isJp ? 'jp' : 'en') + '">'
        + '<div class="ptw-lang-label">' + (isJp ? '\uD83C\uDDEF\uD83C\uDDF5 Japanese' : '\uD83C\uDDEC\uD83C\uDDE7 English') + '</div>'
        + '<div class="ptw-lang-price na">N/A</div>'
        + '</div>';
    }
    var usdLine = data.price_usd != null ? '<div class="ptw-lang-usd">' + fmtUsd(data.price_usd) + ' USD</div>' : '';
    var sourceLine = data.source ? '<div class="ptw-lang-source">' + esc(data.source) + '</div>' : '';
    return '<div class="ptw-lang-card ' + (isJp ? 'jp' : 'en') + '">'
      + '<div class="ptw-lang-label">' + (isJp ? '\uD83C\uDDEF\uD83C\uDDF5 Japanese' : '\uD83C\uDDEC\uD83C\uDDE7 English') + '</div>'
      + '<div class="ptw-lang-price' + (isJp ? ' accent' : '') + '">' + fmtEur(data.price_eur) + '</div>'
      + usdLine
      + sourceLine
      + buyLinksHtml(data.links)
      + '</div>';
  }

  function renderSealed(sealed) {
    var el = $('ptw-sealed');
    if (!sealed || !sealed.length) {
      el.innerHTML = '<div style="text-align:center;color:#444;font-size:12px;padding:16px 0;">No sealed product data available</div>';
      return;
    }

    // Display order: booster box first, then case, then booster
    var order = {'booster box': 0, 'case': 1, 'booster': 2};
    sealed.sort(function(a, b) {
      var oa = order[a.product_type] != null ? order[a.product_type] : 9;
      var ob = order[b.product_type] != null ? order[b.product_type] : 9;
      return oa - ob;
    });

    var typeLabels = {'booster box': 'Booster Box', 'case': 'Case (12x Box)', 'booster': 'Booster Pack'};

    var html = '';
    sealed.forEach(function(item) {
      var label = typeLabels[item.product_type] || item.product_type;
      html += '<div class="ptw-sealed-row">'
        + '<div class="ptw-sealed-type">' + esc(label) + '</div>'
        + '<div class="ptw-sealed-cols">'
        +   renderLangCard('JP', item.jp, true)
        +   renderLangCard('EN', item.en, false)
        + '</div>'
        + '</div>';
    });

    el.innerHTML = html;
  }

  function renderCards(cards) {
    var section = $('ptw-cards-section');
    if (!cards.length) {
      section.innerHTML = '<div class="ptw-error"><strong>No Data Available</strong>Card pricing data is not yet available for this set.</div>';
      return;
    }

    var html = '<div class="ptw-section-title">'
      + '<svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M1 8L3.5 4.5L6 6L9 2" stroke="#c9a84c" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>'
      + 'Top Cards by Market Price'
      + '</div>';

    html += '<table class="ptw-table"><thead><tr>'
      + '<th>Card</th><th>Set</th><th>Rarity</th><th>EU Price</th>'
      + '</tr></thead><tbody>';

    cards.forEach(function(c) {
      var price = c.eu_cardmarket_7d_avg != null ? fmtEur(c.eu_cardmarket_7d_avg) : '\u2014';
      // Wrap price in a link if Cardmarket ID available; otherwise TCGPlayer; otherwise plain
      var priceHtml;
      if (c.links && c.links.cardmarket) {
        priceHtml = '<a href="' + c.links.cardmarket + '" target="_blank" rel="noopener nofollow" class="ptw-card-price-link" title="Buy on Cardmarket">' + price + ' ↗</a>';
      } else if (c.links && c.links.tcgplayer) {
        priceHtml = '<a href="' + c.links.tcgplayer + '" target="_blank" rel="noopener nofollow" class="ptw-card-price-link" title="Buy on TCGPlayer">' + price + ' ↗</a>';
      } else {
        priceHtml = '<span class="ptw-card-price">' + price + '</span>';
      }
      html += '<tr>'
        + '<td><div class="ptw-card-cell">'
        +   cardImg(c.image_url, c.name)
        +   '<div>'
        +     '<div class="ptw-card-name">' + esc(c.name) + '</div>'
        +     '<div class="ptw-card-meta">' + esc(c.card_id) + '</div>'
        +   '</div>'
        + '</div></td>'
        + '<td><span class="ptw-card-set">' + esc(c.set_code || '') + '</span></td>'
        + '<td>' + esc(c.rarity || '') + rarityBadge(c.rarity) + '</td>'
        + '<td>' + priceHtml + '</td>'
        + '</tr>';
    });

    html += '</tbody></table>';
    section.innerHTML = html;
  }

  function renderPicker() {
    $('ptw-set-bar').innerHTML = '<span class="ptw-set-bar-label">Select a set to view live pricing</span>';

    var html = '<div class="ptw-section-title">'
      + '<svg width="10" height="10" viewBox="0 0 10 10" fill="none"><rect x="1" y="1" width="8" height="8" rx="1.5" stroke="#c9a84c" stroke-width="1"/></svg>'
      + 'Available Sets</div><div class="ptw-picker">';
    KNOWN_SETS.forEach(function(s) {
      html += '<button class="ptw-picker-btn" data-set="' + s.code + '">'
        + '<div class="ptw-picker-name">' + esc(s.code) + '</div>'
        + '<div class="ptw-picker-sub">' + esc(s.name) + '</div>'
        + '</button>';
    });
    html += '</div>';

    $('ptw-sealed').style.display = 'none';
    $('ptw-cards-section').innerHTML = html;

    document.querySelectorAll('.ptw-picker-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        loadSetData(btn.getAttribute('data-set'));
      });
    });
  }

  function renderError(msg) {
    $('ptw-sealed').innerHTML = '';
    $('ptw-sealed').style.display = 'none';
    $('ptw-cards-section').innerHTML = '<div class="ptw-error">'
      + '<strong>Unable to Load Data</strong>'
      + esc(msg || 'Please try again later.')
      + '</div>';
  }

  async function loadSetData(setCode) {
    $('ptw-sealed').innerHTML = '<div class="ptw-skeleton ptw-skeleton-stat" style="height:80px;margin-bottom:12px;"></div>'
      + '<div class="ptw-skeleton ptw-skeleton-stat" style="height:80px;"></div>';
    $('ptw-cards-section').innerHTML = '<div class="ptw-skeleton ptw-skeleton-row"></div>'
      + '<div class="ptw-skeleton ptw-skeleton-row short"></div>'
      + '<div class="ptw-skeleton ptw-skeleton-row"></div>';

    var setInfo = KNOWN_SETS.find(function(s) { return s.code === setCode; });
    var setName = setInfo ? setInfo.name : setCode;
    $('ptw-set-bar').innerHTML = '<span class="ptw-set-bar-label">Showing live data for</span> '
      + '<strong>' + esc(setCode) + ' \u2014 ' + esc(setName) + '</strong>';

    try {
      // Use public widget endpoint — no auth, no tier gate, always works
      var data = await fetchJSON(API_BASE + '/api/widget/set/' + encodeURIComponent(setCode));

      if (data.set_name) {
        $('ptw-set-bar').innerHTML = '<span class="ptw-set-bar-label">Showing live data for</span> '
          + '<strong>' + esc(setCode) + ' \u2014 ' + esc(data.set_name) + '</strong>';
      }

      renderSealed(data.sealed || []);
      renderCards(data.cards || []);

      $('ptw-timestamp').textContent = 'Updated ' + new Date().toLocaleString('en-GB', {
        day: 'numeric', month: 'short', year: 'numeric',
        hour: '2-digit', minute: '2-digit'
      });

    } catch (err) {
      renderError('Could not connect to Holygrade Terminal. ' + (err.message || ''));
    }
  }

  // Init — only show widget if a set was detected from the product.
  // No fallback picker: widget is product-specific and must hide when not applicable.
  var setCode = getSetFromURL();
  if (setCode) {
    loadSetData(setCode);
  } else {
    // Hide the entire widget when no set is detected
    var rootEl = document.querySelector('.ptw');
    if (rootEl) rootEl.style.display = 'none';
  }
})();
</script>
</body>
</html>
